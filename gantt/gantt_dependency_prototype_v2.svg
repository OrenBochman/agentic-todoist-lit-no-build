<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-label="Gantt chart prototype with dependency arrows">
  <defs>
    <style>
      .title { font: 700 24px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 12px Inter, Arial, sans-serif; fill: #6b7280; }
      .label { font: 600 13px Inter, Arial, sans-serif; fill: #111827; }
      .small { font: 500 11px Inter, Arial, sans-serif; fill: #6b7280; }
      .header { font: 700 12px Inter, Arial, sans-serif; fill: #374151; }
      .day { font: 500 11px Inter, Arial, sans-serif; fill: #6b7280; }
      .grid { stroke: #eef2f7; stroke-width: 1; }
      .rowline { stroke: #f3f4f6; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 18; }
      .timeline-bg { fill: #fafafa; }
      .bartext { font: 600 12px Inter, Arial, sans-serif; fill: #ffffff; }
      .dep { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .badge { fill: #f3f4f6; stroke: #e5e7eb; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="620" fill="#f8fafc"/>
  <rect x="28" y="28" width="1224" height="564" class="panel" filter="url(#shadow)"/>

  <text x="52" y="66" class="title">Project Plan</text>
  <text x="52" y="88" class="subtitle">Prototype Gantt with sequential dependencies</text>

  <rect x="1035" y="46" width="80" height="28" rx="14" class="badge"/>
  <text x="1075" y="64" text-anchor="middle" class="small">Zoom 100%</text>
  <rect x="1126" y="46" width="92" height="28" rx="14" class="badge"/>
  <text x="1172" y="64" text-anchor="middle" class="small">Dependencies</text>

  <!-- layout constants baked in -->
  <g transform="translate(52,110)">
    <!-- left panel -->
    <rect x="0" y="0" width="290" height="430" fill="#ffffff"/>
    <rect x="290" y="0" width="1" height="430" fill="#e5e7eb"/>
    <text x="12" y="22" class="header">Task</text>
    <text x="220" y="22" class="header">Owner</text>

    <!-- timeline -->
    <g transform="translate(292,0)">
      <rect x="0" y="0" width="880" height="430" class="timeline-bg"/>
      <!-- month header -->
      <rect x="0" y="0" width="880" height="28" fill="#ffffff"/>
      <rect x="0" y="28" width="880" height="28" fill="#f8fafc"/>
      <text x="120" y="18" class="header">May</text>
      <text x="456" y="18" class="header">June</text>
      <text x="760" y="18" class="header">July</text>

      <!-- day labels + vertical grid -->
      <g>
        <line x1="0" y1="0" x2="0" y2="430" class="grid"/>
        <text x="20.0" y="46" text-anchor="middle" class="day">1</text>
        <line x1="40" y1="0" x2="40" y2="430" class="grid"/>
        <text x="60.0" y="46" text-anchor="middle" class="day">3</text>
        <line x1="80" y1="0" x2="80" y2="430" class="grid"/>
        <text x="100.0" y="46" text-anchor="middle" class="day">5</text>
        <line x1="120" y1="0" x2="120" y2="430" class="grid"/>
        <text x="140.0" y="46" text-anchor="middle" class="day">7</text>
        <line x1="160" y1="0" x2="160" y2="430" class="grid"/>
        <text x="180.0" y="46" text-anchor="middle" class="day">9</text>
        <line x1="200" y1="0" x2="200" y2="430" class="grid"/>
        <text x="220.0" y="46" text-anchor="middle" class="day">11</text>
        <line x1="240" y1="0" x2="240" y2="430" class="grid"/>
        <text x="260.0" y="46" text-anchor="middle" class="day">13</text>
        <line x1="280" y1="0" x2="280" y2="430" class="grid"/>
        <text x="300.0" y="46" text-anchor="middle" class="day">15</text>
        <line x1="320" y1="0" x2="320" y2="430" class="grid"/>
        <text x="340.0" y="46" text-anchor="middle" class="day">17</text>
        <line x1="360" y1="0" x2="360" y2="430" class="grid"/>
        <text x="380.0" y="46" text-anchor="middle" class="day">19</text>
        <line x1="400" y1="0" x2="400" y2="430" class="grid"/>
        <text x="420.0" y="46" text-anchor="middle" class="day">21</text>
        <line x1="440" y1="0" x2="440" y2="430" class="grid"/>
        <text x="460.0" y="46" text-anchor="middle" class="day">23</text>
        <line x1="480" y1="0" x2="480" y2="430" class="grid"/>
        <text x="500.0" y="46" text-anchor="middle" class="day">25</text>
        <line x1="520" y1="0" x2="520" y2="430" class="grid"/>
        <text x="540.0" y="46" text-anchor="middle" class="day">27</text>
        <line x1="560" y1="0" x2="560" y2="430" class="grid"/>
        <text x="580.0" y="46" text-anchor="middle" class="day">29</text>
        <line x1="600" y1="0" x2="600" y2="430" class="grid"/>
        <text x="620.0" y="46" text-anchor="middle" class="day">31</text>
        <line x1="640" y1="0" x2="640" y2="430" class="grid"/>
        <text x="660.0" y="46" text-anchor="middle" class="day">2</text>
        <line x1="680" y1="0" x2="680" y2="430" class="grid"/>
        <text x="700.0" y="46" text-anchor="middle" class="day">4</text>
        <line x1="720" y1="0" x2="720" y2="430" class="grid"/>
        <text x="740.0" y="46" text-anchor="middle" class="day">6</text>
        <line x1="760" y1="0" x2="760" y2="430" class="grid"/>
        <text x="780.0" y="46" text-anchor="middle" class="day">8</text>
        <line x1="800" y1="0" x2="800" y2="430" class="grid"/>
        <text x="820.0" y="46" text-anchor="middle" class="day">10</text>
        <line x1="840" y1="0" x2="840" y2="430" class="grid"/>
        <text x="860.0" y="46" text-anchor="middle" class="day">12</text>
      </g>
    </g>

    <!-- rows -->
    <g>
      <line x1="0" y1="56" x2="1172" y2="56" class="rowline"/>
      <line x1="0" y1="116" x2="1172" y2="116" class="rowline"/>
      <line x1="0" y1="176" x2="1172" y2="176" class="rowline"/>
      <line x1="0" y1="236" x2="1172" y2="236" class="rowline"/>
      <line x1="0" y1="296" x2="1172" y2="296" class="rowline"/>
      <line x1="0" y1="356" x2="1172" y2="356" class="rowline"/>
      <line x1="0" y1="416" x2="1172" y2="416" class="rowline"/>
    </g>

    <!-- left labels -->
    <g>
      <text x="12" y="92" class="label">Research</text>
      <text x="220" y="92" class="small">Dana</text>

      <text x="12" y="152" class="label">Wireframes</text>
      <text x="220" y="152" class="small">Oren</text>

      <text x="12" y="212" class="label">Web Component</text>
      <text x="220" y="212" class="small">Maya</text>

      <text x="12" y="272" class="label">Dependency Logic</text>
      <text x="220" y="272" class="small">Noam</text>

      <text x="12" y="332" class="label">Integration</text>
      <text x="220" y="332" class="small">Lia</text>

      <text x="12" y="392" class="label">QA Pass</text>
      <text x="220" y="392" class="small">Avi</text>
    </g>

    <!-- bars -->
    <g transform="translate(292,0)">
      <!-- helper: x = day*20 -->
      <!-- row 1 -->
      <g>
        <rect x="40" y="68" width="120" height="20" rx="10" fill="#60a5fa"/>
        <circle cx="40" cy="78" r="5.5" fill="#facc15" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="100" cy="78" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="160" cy="78" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2"/>
        <text x="100" y="82" text-anchor="middle" class="bartext">May 3–9</text>
      </g>

      <!-- row 2 -->
      <g>
        <rect x="220" y="128" width="140" height="20" rx="10" fill="#34d399"/>
        <circle cx="220" cy="138" r="5.5" fill="#facc15" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="290" cy="138" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="360" cy="138" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2"/>
        <text x="290" y="142" text-anchor="middle" class="bartext">May 12–19</text>
      </g>

      <!-- row 3 -->
      <g>
        <rect x="420" y="188" width="160" height="20" rx="10" fill="#a78bfa"/>
        <circle cx="420" cy="198" r="5.5" fill="#facc15" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="500" cy="198" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="580" cy="198" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2"/>
        <text x="500" y="202" text-anchor="middle" class="bartext">May 22–30</text>
      </g>

      <!-- row 4 -->
      <g>
        <rect x="640" y="248" width="120" height="20" rx="10" fill="#f59e0b"/>
        <circle cx="640" cy="258" r="5.5" fill="#facc15" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="700" cy="258" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="760" cy="258" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2"/>
        <text x="700" y="262" text-anchor="middle" class="bartext">Jun 2–8</text>
      </g>

      <!-- row 5 -->
      <g>
        <rect x="760" y="308" width="140" height="20" rx="10" fill="#fb7185"/>
        <circle cx="760" cy="318" r="5.5" fill="#facc15" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="830" cy="318" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="900" cy="318" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2"/>
        <text x="830" y="322" text-anchor="middle" class="bartext">Jun 8–15</text>
      </g>

      <!-- row 6 -->
      <g>
        <rect x="940" y="368" width="120" height="20" rx="10" fill="#22c55e"/>
        <circle cx="940" cy="378" r="5.5" fill="#facc15" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="1000" cy="378" r="5.5" fill="#ef4444" stroke="#ffffff" stroke-width="1.2"/>
        <circle cx="1060" cy="378" r="5.5" fill="#2563eb" stroke="#ffffff" stroke-width="1.2"/>
        <text x="1000" y="382" text-anchor="middle" class="bartext">Jun 17–23</text>
      </g>

      <!-- dependency arrows: blue source -> right then down -> yellow target -->
      <path class="dep" marker-end="url(#arrowHead)" d="M160,78 H188 Q200,78 200,90 V126 Q200,138 212,138 H220"/>
      <path class="dep" marker-end="url(#arrowHead)" d="M360,138 H388 Q400,138 400,150 V186 Q400,198 412,198 H420"/>
      <path class="dep" marker-end="url(#arrowHead)" d="M580,198 H608 Q620,198 620,210 V246 Q620,258 632,258 H640"/>
      <path class="dep" marker-end="url(#arrowHead)" d="M760,258 H770 Q780,258 780,268 V308 Q780,318 770,318 H760"/>
      <path class="dep" marker-end="url(#arrowHead)" d="M900,318 H918 Q930,318 930,330 V366 Q930,378 938,378 H940"/>
    </g>
  </g>
</svg>
