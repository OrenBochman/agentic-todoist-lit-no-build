<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager Add Task Regression Test</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.5.0/dist/styles/webawesome.css"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-background: #09111d;
        --panel-background: rgba(11, 19, 32, 0.82);
        --panel-border: rgba(148, 163, 184, 0.18);
        --text-strong: #eff6ff;
        --text-muted: #a8b3c7;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        font-family: "Atkinson Hyperlegible", sans-serif;
        background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 28%),
          linear-gradient(180deg, #08111e 0%, #101a2c 100%);
        color: var(--text-strong);
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      .card {
        border-radius: 24px;
        padding: 24px;
        background: var(--panel-background);
        border: 1px solid var(--panel-border);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.5;
      }

      #mount {
        margin-top: 20px;
      }

      .results {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }

      .result {
        border-radius: 16px;
        padding: 14px 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.44);
      }

      .result[data-status='passed'] {
        border-color: rgba(74, 222, 128, 0.36);
      }

      .result[data-status='failed'] {
        border-color: rgba(248, 113, 113, 0.4);
      }

      .result strong {
        display: block;
        margin-bottom: 4px;
      }

      .result code {
        font-family: ui-monospace, monospace;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Task Manager Add Task Regression Test</h1>
        <p>
          This page tests the full add-task path through the root app to make sure clicking the
          <code>+</code> button inserts a task into app state and renders it in the board.
        </p>

        <div id="mount"></div>
        <div id="results" class="results" aria-live="polite"></div>
      </section>
    </main>

    <script type="module">
      import { setBasePath, startLoader } from 'https://esm.sh/@awesome.me/webawesome@3.5.0/dist/webawesome.loader.js';
      import '../script.js';

      const STORAGE_KEY = 'task-manager-items';
      const THEME_STORAGE_KEY = 'task-manager-theme';

      setBasePath('https://esm.sh/@awesome.me/webawesome@3.5.0/dist/');
      startLoader();

      const mount = document.getElementById('mount');
      const results = document.getElementById('results');

      const waitForRender = async () => {
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      };

      const addResult = (name, passed, detail) => {
        const item = document.createElement('div');
        item.className = 'result';
        item.dataset.status = passed ? 'passed' : 'failed';
        item.innerHTML = `<strong>${passed ? 'PASS' : 'FAIL'}: ${name}</strong><code>${detail}</code>`;
        results.append(item);
      };

      const assert = (condition, message) => {
        if (!condition) {
          throw new Error(message);
        }
      };

      window.localStorage.removeItem(STORAGE_KEY);
      window.localStorage.removeItem(THEME_STORAGE_KEY);

      const app = document.createElement('task-manager-app');
      app.setAttribute('data-wa-preload', 'wa-button wa-input');
      mount.append(app);

      await customElements.whenDefined('task-manager-app');
      await customElements.whenDefined('wa-input');
      await customElements.whenDefined('wa-button');
      await waitForRender();

      const appShadow = app.shadowRoot;
      const composer = appShadow.querySelector('task-composer');
      const composerShadow = composer.shadowRoot;
      const input = composerShadow.querySelector('wa-input');
      const button = composerShadow.querySelector('wa-button');
      const board = appShadow.querySelector('task-board');

      const tests = [
        {
          name: 'Clicking plus adds a task to the root app',
          run: async () => {
            const beforeCount = app.tasks.length;

            input.value = 'test 123';
            input.dispatchEvent(new CustomEvent('wa-input', { bubbles: true, composed: true }));
            await waitForRender();

            button.click();
            await waitForRender();

            const boardItems = [...board.shadowRoot.querySelectorAll('task-item')];
            const firstTaskText = boardItems[0]?.task?.text ?? '';

            assert(app.tasks.length === beforeCount + 1, 'root app task count did not increase');
            assert(app.tasks[0]?.text === 'test 123', 'new task was not inserted at the top of app state');
            assert(firstTaskText === 'test 123', 'new task was not rendered in the task board');
          },
        },
        {
          name: 'Clicking the task toggle marks the task completed',
          run: async () => {
            const firstItem = board.shadowRoot.querySelector('task-item');
            const toggle = firstItem?.shadowRoot?.querySelector('.toggle');

            assert(toggle, 'task toggle was not rendered');
            assert(app.tasks[0]?.completed === false, 'expected the task to start pending');

            toggle.click();
            await waitForRender();

            const updatedFirstItem = board.shadowRoot.querySelector('task-item');
            const meta = updatedFirstItem?.shadowRoot?.querySelector('.task-meta')?.textContent?.trim() ?? '';

            assert(app.tasks[0]?.completed === true, 'clicking the task toggle did not mark the task completed');
            assert(updatedFirstItem?.task?.completed === true, 'task-item did not receive completed state');
            assert(meta === 'Completed', 'completed task status was not rendered');
          },
        },
      ];

      for (const test of tests) {
        try {
          await test.run();
          addResult(test.name, true, 'ok');
        } catch (error) {
          addResult(test.name, false, error instanceof Error ? error.message : String(error));
        }
      }

      window.localStorage.removeItem(STORAGE_KEY);
      window.localStorage.removeItem(THEME_STORAGE_KEY);
    </script>
  </body>
</html>
