<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager Regression Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/mocha@10.7.3/mocha.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.5.0/dist/styles/webawesome.css"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-background: #09111d;
        --panel-background: rgba(11, 19, 32, 0.82);
        --panel-border: rgba(148, 163, 184, 0.18);
        --text-strong: #eff6ff;
        --text-muted: #a8b3c7;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        font-family: "Atkinson Hyperlegible", sans-serif;
        background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 28%),
          linear-gradient(180deg, #08111e 0%, #101a2c 100%);
        color: var(--text-strong);
      }

      main {
        width: min(1100px, 100%);
        margin: 0 auto;
      }

      .card {
        border-radius: 24px;
        padding: 24px;
        background: var(--panel-background);
        border: 1px solid var(--panel-border);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.5;
      }

      #mount {
        margin-top: 20px;
      }

      #mocha {
        margin-top: 24px;
        color: var(--text-strong);
      }

      #mocha .suite h1,
      #mocha .suite h2,
      #mocha .test {
        color: var(--text-strong);
      }

      #mocha .test.pass {
        color: #4ade80;
      }

      #mocha .test.fail {
        color: #f87171;
      }

      #mocha-stats {
        position: static;
        margin-top: 16px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Task Manager Regression Dashboard</h1>
        <p>
          This page runs the full browser regression suite in one Mocha session so you can verify
          composer, app, hero, and transfer behavior from a single dashboard.
        </p>

        <div id="mount" data-wa-preload="wa-button wa-input wa-icon"></div>
        <div id="mocha"></div>
      </section>
    </main>

    <script src="https://unpkg.com/mocha@10.7.3/mocha.js"></script>
    <script src="https://unpkg.com/chai@4.5.0/chai.js"></script>
    <script type="module">
      import { runBrowserTests } from './helpers/browser-test-harness.js';
      await import('./specs/all-regression.spec.js');
      await runBrowserTests();
    </script>
  </body>
</html>
