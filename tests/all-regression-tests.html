<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager Regression Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/mocha@10.7.3/mocha.css" />
    <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.5.0/styles/themes/default.css" />
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.5.0/webawesome.loader.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --page-background: #09111d;
        --panel-background: rgba(11, 19, 32, 0.82);
        --panel-border: rgba(148, 163, 184, 0.18);
        --text-strong: #eff6ff;
        --text-muted: #a8b3c7;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
        font-family: "Atkinson Hyperlegible", sans-serif;
        background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 28%),
          linear-gradient(180deg, #08111e 0%, #101a2c 100%);
        color: var(--text-strong);
      }

      main {
        width: min(1100px, 100%);
        margin: 0 auto;
      }

      .card {
        border-radius: 24px;
        padding: 24px;
        background: var(--panel-background);
        border: 1px solid var(--panel-border);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.5;
      }

      #summary {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.44);
        color: var(--text-strong);
      }

      #summary[data-status='running'] {
        border-color: color-mix(in srgb, var(--accent) 36%, transparent);
      }

      #summary[data-status='passed'] {
        border-color: rgba(74, 222, 128, 0.36);
      }

      #summary[data-status='failed'] {
        border-color: rgba(248, 113, 113, 0.4);
      }

      #mount {
        margin-top: 20px;
        width: 100vw;
        min-width: 980px;
        margin-left: auto;
        margin-right: auto;
        display: block;
      }

      #mocha {
        margin-top: 24px;
        color: var(--text-strong);
      }

      #mocha .suite h1,
      #mocha .suite h2,
      #mocha .test {
        color: var(--text-strong);
      }

      #mocha .test.pass {
        color: #4ade80;
      }

      #mocha .test.fail {
        color: #f87171;
      }

      #mocha-stats {
        position: static;
        margin-top: 16px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Task Manager Regression Dashboard</h1>
        <p>
          This page runs the full browser regression suite in one Mocha session so you can verify
          composer, app, hero, and transfer behavior from a single dashboard.
        </p>

        <div id="summary" data-status="running" aria-live="polite">Running regression suite...</div>

        <div id="mount"></div>
        <div id="mocha"></div>
      </section>
    </main>

    <script src="https://unpkg.com/mocha@10.7.3/mocha.js"></script>
    <script src="https://unpkg.com/chai@4.5.0/chai.js"></script>
    <script type="module">
      import { runBrowserTests } from './helpers/browser-test-harness.js';
      const summary = document.getElementById('summary');

      await import('./specs/all-regression.spec.js');
      const failures = await runBrowserTests();

      if (failures === 0) {
        summary.dataset.status = 'passed';
        summary.textContent = 'Regression suite passed. All browser tests are green.';
      } else {
        summary.dataset.status = 'failed';
        summary.textContent = `Regression suite failed with ${failures} ${failures === 1 ? 'test' : 'tests'} failing.`;
      }
    </script>
  </body>
</html>
