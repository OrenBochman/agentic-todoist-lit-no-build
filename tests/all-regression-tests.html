<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager Regression Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/mocha@10.7.3/mocha.css" />
    <link rel="stylesheet" href="https://ka-f.webawesome.com/webawesome@3.5.0/styles/themes/default.css" />
    <link rel="stylesheet" href="./all-regression-tests.css" />
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.5.0/webawesome.loader.js"></script>
    <script type="module" src="./components/regression-dashboard.js"></script>
  </head>
  <body>
    <regression-dashboard></regression-dashboard>

    <script src="https://unpkg.com/mocha@10.7.3/mocha.js"></script>
    <script src="https://unpkg.com/chai@4.5.0/chai.js"></script>
    <script type="module">
      import { runBrowserTests } from './helpers/browser-test-harness.js';
      const dashboard = document.querySelector('regression-dashboard');
      const summary = dashboard.querySelector('regression-summary');
      const metrics = dashboard.querySelector('regression-metrics');
      const toolbar = dashboard.querySelector('regression-toolbar');
      const failurePanel = dashboard.querySelector('regression-failure-list');
      const failureList = failurePanel.listElement;
      const searchInput = toolbar.searchInput;
      const filterButtons = toolbar.filterButtons;
      const runMetrics = {
        allTests: [],
        passedTests: [],
        failedTests: [],
        registeredTests: 0,
      };
      let activeFilter = 'all';

      const countRegisteredTests = (suite) => {
        if (!suite) {
          return 0;
        }

        const childSuites = Array.isArray(suite.suites) ? suite.suites : [];
        const ownTests = Array.isArray(suite.tests) ? suite.tests.length : 0;
        return ownTests + childSuites.reduce((total, childSuite) => total + countRegisteredTests(childSuite), 0);
      };

      const formatDuration = (duration) => {
        if (!Number.isFinite(duration)) {
          return '0 ms';
        }
        return duration >= 1000 ? `${(duration / 1000).toFixed(2)} s` : `${Math.round(duration)} ms`;
      };

      const testLabel = (entry) => entry.fullTitle || entry.title || 'Unnamed test';

      const assignTestRowIds = () => {
        const testRows = [...document.querySelectorAll('#mocha-report > li.test, #mocha-report li.test')];
        testRows.forEach((row, index) => {
          row.dataset.testIndex = String(index);
          if (!row.id) {
            row.id = `test-row-${index}`;
          }
        });
      };

      const updateMetrics = () => {
        const total = runMetrics.registeredTests || runMetrics.allTests.length;
        const executed = runMetrics.allTests.length;
        const failures = runMetrics.failedTests.length;
        const passes = runMetrics.passedTests.length;
        const duration = runMetrics.allTests.reduce((sum, test) => sum + (test.duration || 0), 0);
        const passRate = total ? Math.round((passes / total) * 100) : 0;

        const durationLabel = formatDuration(duration);
        if (!total) {
          summary.setValues({
            passRate,
            totalLabel: `${total} registered`,
            failuresLabel: `${failures} ${failures === 1 ? 'failure' : 'failures'}`,
            durationLabel,
            heading: 'Running regression suite...',
            body: 'Collecting results from the browser suite.',
          });
        } else if (!failures) {
          summary.setValues({
            passRate,
            totalLabel: `${total} registered`,
            failuresLabel: `${failures} ${failures === 1 ? 'failure' : 'failures'}`,
            durationLabel,
            heading: 'Regression suite passed',
            body: 'No failures detected. The dashboard is focused on failure triage, so the test list can stay filtered unless you need to inspect passes.',
          });
        } else {
          summary.setValues({
            passRate,
            totalLabel: `${total} registered`,
            failuresLabel: `${failures} ${failures === 1 ? 'failure' : 'failures'}`,
            durationLabel,
            heading: `${failures} ${failures === 1 ? 'failure' : 'failures'} need attention`,
            body: 'The list below is filtered to failing tests by default so the useful information stays on screen.',
          });
        }

        const slowest = [...runMetrics.allTests]
          .sort((a, b) => (b.duration || 0) - (a.duration || 0))[0];

        metrics.setValues({
          total,
          filtered: `${document.querySelectorAll('#mocha li.test:not(.is-hidden)').length} visible • ${executed} executed`,
          failures,
          duration: durationLabel,
          slowest: slowest
            ? `${testLabel(slowest)} • ${formatDuration(slowest.duration || 0)}`
            : 'No timing data yet',
          topFailure: runMetrics.failedTests.length
            ? testLabel(runMetrics.failedTests[0])
            : 'No failures recorded',
        });
      };

      const updateFailureList = () => {
        failureList.replaceChildren();

        if (!runMetrics.failedTests.length) {
          failurePanel.setVisible(false);
          return;
        }

        runMetrics.failedTests.forEach((entry, index) => {
          const item = document.createElement('li');
          const link = document.createElement('a');
          const row = document.querySelector(`#test-row-${entry.index}`);

          link.href = row ? `#${row.id}` : '#mocha';
          link.textContent = `${index + 1}. ${testLabel(entry)}`;
          link.addEventListener('click', () => {
            document.querySelectorAll('#mocha .test.highlighted').forEach((node) => {
              node.classList.remove('highlighted');
            });
            if (row) {
              row.classList.add('highlighted');
            }
          });

          item.append(link);
          failureList.append(item);
        });

        failurePanel.setVisible(true);
      };

      const applyDashboardFilters = () => {
        const searchTerm = searchInput.value.trim().toLowerCase();
        const testRows = [...document.querySelectorAll('#mocha li.test')];
        let visibleCount = 0;

        testRows.forEach((row) => {
          const isPass = row.classList.contains('pass');
          const isFail = row.classList.contains('fail');
          const text = row.textContent.toLowerCase();
          const matchesFilter = activeFilter === 'all'
            || (activeFilter === 'pass' && isPass)
            || (activeFilter === 'fail' && isFail);
          const matchesSearch = !searchTerm || text.includes(searchTerm);
          const visible = matchesFilter && matchesSearch;

          row.classList.toggle('is-hidden', !visible);
          if (visible) {
            visibleCount += 1;
          }
        });

        const suiteRows = [...document.querySelectorAll('#mocha-report li.suite')].reverse();
        suiteRows.forEach((suiteRow) => {
          const visibleChildTests = suiteRow.querySelectorAll(':scope > ul > li.test:not(.is-hidden)');
          const visibleChildSuites = suiteRow.querySelectorAll(':scope > ul > li.suite:not(.is-hidden)');
          const hasVisibleContent = visibleChildTests.length > 0 || visibleChildSuites.length > 0;
          suiteRow.classList.toggle('is-hidden', !hasVisibleContent);
        });

        metrics.querySelector('#metric-filtered').textContent = `${visibleCount} visible • ${runMetrics.allTests.length} executed`;
      };

      filterButtons.forEach((button) => {
        button.addEventListener('click', () => {
          activeFilter = button.dataset.filter;
          toolbar.setActiveFilter(activeFilter);
          applyDashboardFilters();
        });
      });

      searchInput.addEventListener('input', () => {
        applyDashboardFilters();
      });

      // Add global error logging for test failures
      if (window.mocha) {
        mocha.run = (function(origRun) {
          return function(...args) {
            const runner = origRun.apply(this, args);
            let testIndex = 0;

            runner.on('pass', function(test) {
              runMetrics.passedTests.push({
                index: testIndex,
                title: test.title,
                fullTitle: test.fullTitle?.(),
                duration: test.duration || 0,
              });
            });
            runner.on('fail', function(test, err) {
              runMetrics.failedTests.push({
                index: testIndex,
                title: test.title,
                fullTitle: test.fullTitle?.(),
                duration: test.duration || 0,
                message: err?.message || '',
              });
              console.error('Test failed:', test.title, err);
            });
            runner.on('test end', function(test) {
              runMetrics.allTests.push({
                index: testIndex,
                title: test.title,
                fullTitle: test.fullTitle?.(),
                duration: test.duration || 0,
                state: test.state || 'unknown',
              });
              testIndex += 1;
            });
            return runner;
          };
        })(mocha.run);
      }

      await import('./specs/all-regression.spec.js?v=2026-04-21-coverage-pass-2');
      runMetrics.registeredTests = countRegisteredTests(window.mocha?.suite);
      const failures = await runBrowserTests();

      summary.setStatus(failures === 0 ? 'passed' : 'failed');
      dashboard.querySelector('#mount').dataset.hidden = 'true';

      assignTestRowIds();
      updateMetrics();
      updateFailureList();
      applyDashboardFilters();
    </script>
  </body>
</html>
